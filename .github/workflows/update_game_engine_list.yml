# Update the game engine list and commit the results
name: Update_Game_Engines

on: 
  workflow_dispatch:

jobs:
  update-game-engines:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.26"
          python-version: "3.13"
          enable-cache: true
      - name: Make venv
        run: uv venv
      - name: Install dependencies
        run: uv pip install .
      - name: update_engines
        env:
          GES_USER_AGENT: ${{secrets.GES_USER_AGENT}}
          GES_EMAIL: ${{secrets.GES_EMAIL}}
          PUBMED_API_KEY: ${{secrets.PUBMED_API_KEY}}          
          PUBMED_API_THROTTLE: 0.3
        run: uv run update_game_engine_list.py 
